# uv workspace root for the PsiData monorepo (virtual root — not a package itself).
#   packages/psidata        — the standalone, pip-installable science library
#   apps/psidataviz-dash     — interim Dash app (retired once the FastAPI+React UI lands)
#   apps/backend, apps/frontend — added in Phase 5
[tool.uv.workspace]
members = ["packages/*", "apps/*"]
exclude = ["apps/frontend"]  # the React/TS frontend is an npm package, not a Python one

[tool.uv.sources]
psidata = { workspace = true }
