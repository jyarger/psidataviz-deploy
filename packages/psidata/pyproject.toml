[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "psidata"
version = "0.2.0"
description = "Ingest, parse, and convert experimental & computational scientific data (Ψ Data)"
readme = "README.md"
requires-python = ">=3.11"
license = { text = "MIT" }
authors = [{ name = "Yarger Lab" }]
keywords = ["science", "data", "ingestion", "spectroscopy", "dsc", "nmr", "ftir", "raman"]

dependencies = [
    "pydantic>=2.6",
    "pandas>=2.1",
    "httpx>=0.27",
    "platformdirs>=4.2",
]

[project.optional-dependencies]
export = ["plotly>=5.20", "nbformat>=5.10"]
# CSDM (.csdf) is written directly as its lightweight JSON form — no heavy csdmpy/astropy dep.
convert = ["h5py>=3.10", "zarr>=2.17", "pyarrow>=15.0", "hdf5plugin>=4.0", "fabio>=2024.1", "brukeropusreader>=1.3", "cclib>=1.8", "pillow>=10.0", "openpyxl>=3.1", "xlrd>=2.0.1", "rdkit>=2023.9", "ncempy>=1.10"]
dev = ["pytest>=8.0", "ruff>=0.4", "respx>=0.21", "h5py>=3.10", "zarr>=2.17", "pyarrow>=15.0",
       "hdf5plugin>=4.0", "fabio>=2024.1", "brukeropusreader>=1.3", "cclib>=1.8", "pillow>=10.0", "openpyxl>=3.1", "xlrd>=2.0.1", "rdkit>=2023.9", "ncempy>=1.10"]

[tool.hatch.build.targets.wheel]
packages = ["src/psidata"]

[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "-q"
pythonpath = ["src"]

[tool.ruff]
line-length = 100
target-version = "py311"

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B"]
ignore = ["E501"]
